<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gods Above</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600&family=Cinzel+Decorative:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/loading.css" />
</head>

<body>

  <!-- LOADER GLOBAL -->
  <div id="screen-loading">
    <canvas id="loading-canvas"></canvas>

    <div class="loading-seal">
      <svg class="seal-svg" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="seal-ring">
          <circle cx="80" cy="80" r="72" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.6"/>
          <circle cx="80" cy="80" r="65" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>
          <line x1="80" y1="8" x2="80" y2="16" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
          <line x1="152" y1="80" x2="144" y2="80" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
          <line x1="80" y1="152" x2="80" y2="144" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
          <line x1="8" y1="80" x2="16" y2="80" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
        </g>

        <g style="animation: rotateSeal 5s linear infinite reverse; transform-origin:80px 80px;">
          <circle cx="80" cy="80" r="54" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="2 6" opacity="0.5"/>
        </g>

        <g opacity="0.9">
          <circle cx="80" cy="80" r="10" fill="none" stroke="#C9A84C" stroke-width="1"/>
          <circle cx="80" cy="80" r="4" fill="#C9A84C"/>
        </g>
      </svg>

      <div class="loading-title">GODS ABOVE</div>
      <div class="loading-sub">Univers de Fiction</div>

      <div class="loading-bar-wrap">
        <div class="loading-bar" id="loading-bar"></div>
      </div>

      <div class="loading-pct" id="loading-pct">0%</div>

      <button class="enter-btn" id="enter-btn" onclick="enterSite()">
        ENTRER DANS L'UNIVERS
      </button>
    </div>
  </div>

  <!-- MENU PERMANENT -->
  <nav class="site-nav">
    <a href="#/accueil" class="nav-logo" data-route="accueil">GODS ABOVE</a>

    <ul class="nav-links">
      <li><a href="#/accueil" data-route="accueil">Accueil</a></li>
      <li><a href="#/magie" data-route="magie">Magie</a></li>
      <li><a href="#/race" data-route="race">Race</a></li>
      <li><a href="#/chronologie" data-route="chronologie">Chronologie</a></li>
      <li><a href="#/unite" data-route="unite">Unité</a></li>
      <li><a href="#/creation" data-route="creation">Création</a></li>
    </ul>
  </nav>

  <!-- ZONE OÙ LES PAGES SE CHARGENT -->
  <main id="ga-app"></main>

  <script src="js/router.js"></script>
  <script src="js/loading.js"></script>
</body>
</html>
