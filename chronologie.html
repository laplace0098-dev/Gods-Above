<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gods Above — Chronologie & Histoire</title>

  <!--
  ═══════════════════════════════════════════════════════════════════
  GODS ABOVE — PAGE CHRONOLOGIE — NOTES POUR DÉVELOPPEUR / LLM
  ═══════════════════════════════════════════════════════════════════

  Version pleine page de la chronologie (auparavant seulement en modal
  sur index.html). Reprend les mêmes données ERAS pour rester cohérent.

  POUR AJOUTER / MODIFIER UNE ÈRE :
  - Aller dans const ERAS (JS, bas du fichier)
  - Chaque ère : name, range, color (optionnel), description, events[]
  - Chaque événement : year, title, desc
  - La frise, les boutons et le détail se génèrent automatiquement.

  NAVIGATION :
  - Clic sur un point de la frise OU sur un bouton d'ère → affiche son détail
  - Flèches ← → (clavier) → ère précédente / suivante
  - Boutons Précédent/Suivant en bas du détail
  ═══════════════════════════════════════════════════════════════════
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & TOKENS (identiques à index.html) ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --gold-dim: #7A622A;
      --dark: #0A0B0F;
      --panel: #12131A;
      --panel-2: #1E1F28;
      --border: rgba(201,168,76,0.25);
      --text: #E8DFC7;
      --text-muted: #8FA8C0;
      --accent: #8FA8C0;
      --danger: #C45C5C;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }
    ::selection { background: var(--gold-dim); color: var(--text); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }
    a { color: inherit; }

    /* ─── NAV (identique à index.html) ─── */
    .site-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,11,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-btn {
      padding: 6px 18px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      border: none;
    }
    .nav-btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .nav-btn-outline:hover { border-color: var(--gold); background: rgba(201,168,76,0.06); }
    .nav-btn-fill { background: var(--gold); color: var(--dark); font-weight: 600; }
    .nav-btn-fill:hover { background: var(--gold-light); }

    /* ─── PAGE HERO ─── */
    .page-hero {
      position: relative;
      padding: 80px 48px 40px;
      text-align: center;
      overflow: hidden;
    }
    .page-hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%),
        #0A0B0F;
      z-index: -1;
    }
    .page-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px; justify-content: center;
    }
    .page-eyebrow::before, .page-eyebrow::after {
      content: '';
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--text-muted));
    }
    .page-eyebrow::after { transform: scaleX(-1); }
    .page-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 60px rgba(201,168,76,0.3);
      margin-bottom: 20px;
    }
    .page-tagline {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text);
      max-width: 560px;
      line-height: 1.8;
      margin: 0 auto;
      opacity: 0.85;
    }

    /* ─── TIMELINE FRISE ─── */
    .timeline-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 48px 0;
    }
    .era-timeline {
      display: flex;
      gap: 0;
      margin-top: 20px;
      position: relative;
    }
    .era-timeline::before {
      content: '';
      position: absolute;
      top: 22px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .era-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
      cursor: pointer;
      padding: 0 8px 24px;
      background: none;
      border: none;
      color: inherit;
      font-family: inherit;
    }
    .era-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: var(--dark);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
      position: relative; z-index: 1;
    }
    .era-item:hover .era-dot { background: var(--gold-dim); }
    .era-item.active .era-dot {
      background: var(--gold);
      box-shadow: 0 0 16px rgba(201,168,76,0.6);
    }
    .era-name {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-align: center;
      text-transform: uppercase;
      transition: color 0.3s;
      line-height: 1.4;
    }
    .era-item:hover .era-name { color: var(--text); }
    .era-item.active .era-name { color: var(--gold); }

    /* ─── DETAIL ─── */
    .detail-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 48px 100px;
    }
    .detail-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 48px;
      position: relative;
      overflow: hidden;
    }
    .detail-panel::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 2px;
      background: var(--gold);
    }
    .detail-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .detail-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .detail-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      color: var(--gold);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .detail-range {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .detail-desc {
      font-size: 0.98rem;
      line-height: 1.9;
      color: var(--text);
      font-weight: 300;
      margin-bottom: 40px;
      max-width: 760px;
    }

    .events-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .cal-events {
      display: flex; flex-direction: column; gap: 12px;
      margin-bottom: 40px;
    }
    .cal-event {
      display: flex; gap: 24px; align-items: flex-start;
      padding: 18px 24px;
      background: var(--panel-2);
      border-left: 2px solid var(--gold-dim);
      transition: border-color 0.2s, transform 0.2s;
    }
    .cal-event:hover { border-left-color: var(--gold); transform: translateX(2px); }
    .cal-event-year {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      color: var(--gold);
      flex-shrink: 0;
      min-width: 90px;
      padding-top: 1px;
    }
    .cal-event-text { font-size: 0.88rem; line-height: 1.6; color: var(--text); }
    .cal-event-title { font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .cal-event-desc { color: var(--text-muted); font-size: 0.82rem; }

    .detail-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .detail-nav-btn {
      padding: 10px 24px;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--border);
      transition: all 0.2s;
      display: flex; align-items: center; gap: 10px;
    }
    .detail-nav-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(201,168,76,0.06); }
    .detail-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .detail-nav-counter {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 760px) {
      .site-nav { padding: 0 20px; }
      .nav-links { display: none; }
      .page-hero { padding: 56px 20px 32px; }
      .timeline-wrap, .detail-section { padding-left: 20px; padding-right: 20px; }
      .era-timeline { flex-wrap: wrap; gap: 16px 0; }
      .era-timeline::before { display: none; }
      .era-item { flex: 1 1 33%; }
      .detail-panel { padding: 28px 20px; }
      .cal-event { flex-direction: column; gap: 6px; }
      .cal-event-year { min-width: 0; }
      .detail-nav-btn span.label { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">GODS ABOVE</a>
    <ul class="nav-links">
      <li><a href="monde.html">Monde & Lieux</a></li>
      <li><a href="personnages.html">Personnages</a></li>
      <li><a href="magie.html">Magie</a></li>
      <li><a href="race.html">Race</a></li>
      <li><a href="chronologie.html" class="active">Chronologie</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-btn nav-btn-outline">Boutique</button>
      <button class="nav-btn nav-btn-fill">Connexion</button>
    </div>
  </nav>

  <!-- PAGE HERO -->
  <header class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="page-eyebrow">Lore — Le Fil du Temps</div>
    <h1 class="page-title">Chronologie & Histoire</h1>
    <p class="page-tagline">
      Cinq ères. Un seul fil. De la chute de l'Ancien Monde à l'Éveil des Neo Gods —
      mille ans d'histoire séparent ce qui fut de ce qui est.
    </p>
  </header>

  <!-- TIMELINE FRISE -->
  <div class="timeline-wrap">
    <div class="era-timeline" id="era-timeline">
      <!-- généré dynamiquement par JS -->
    </div>
  </div>

  <!-- DETAIL -->
  <section class="detail-section">
    <div class="detail-panel" id="detail-panel">
      <!-- généré dynamiquement par JS -->
    </div>
  </section>

  <script>
    /* ═══════════════════════════════════════════════════════
       DONNÉES — CHRONOLOGIE
       Identiques à celles d'index.html, pour rester cohérent.
       Pour ajouter/modifier une ère, éditer ce tableau.
       Chaque ère : name, range, description, events[]
       Chaque événement : year (string), title, desc
    ═══════════════════════════════════════════════════════ */
    const ERAS = [
      {
        name: "Ancienne Ère / Ère Contemporaine",
        range: "Jusqu'au XXIe siècle",
        description: "L'âge de la civilisation humaine telle qu'elle fut connue. Technologie, nations-états, géopolitique. Une époque d'expansion suivie d'un déclin progressif et inévitable.",
        events: [
          { year: "~2030", title: "Le Grand Recul", desc: "Premières vagues massives de migrations climatiques. Les états côtiers commencent à s'effondrer." },
          { year: "~2055", title: "Guerres de Ressources", desc: "Conflits armés pour l'eau potable et les terres arables. La géopolitique mondiale se fracture définitivement." },
          { year: "~2080", title: "Les Premiers Dormants", desc: "Mise en service des premières chambres de stase commerciales. Les élites fuient le présent." },
          { year: "~2099", title: "L'Endormissement Massif", desc: "Des milliers de personnes entrent en stase. Elles pensent se réveiller dans un monde sauvé." },
        ]
      },
      {
        name: "Ère des Cataclysmes",
        range: "Années 100 — 400 post-stase",
        description: "Sans les structures humaines pour les contenir, les catastrophes se succèdent. Les villes se vident, les réseaux s'effondrent. La nature reprend ses droits sur les ruines.",
        events: [
          { year: "An 120", title: "Fin des Réseaux", desc: "Les derniers systèmes d'information s'éteignent. L'humanité perd sa mémoire collective." },
          { year: "An 210", title: "Mutation de la Faune", desc: "Les premières mutations dues à la pollution radioactive sont observées dans la faune et la flore." },
          { year: "An 350", title: "Premières Communautés", desc: "Des groupes survivants se sédentarisent. Les bases des futurs royaumes sont posées." },
        ]
      },
      {
        name: "Ère du Faux Espoir",
        range: "Années 400 — 700 post-stase",
        description: "Une renaissance trompeuse. De nouveaux systèmes sociaux émergent, des cultes naissent, des royaumes s'établissent. Mais l'énergie ambiante continue de muter imperceptiblement.",
        events: [
          { year: "An 420", title: "Naissance de la Magie", desc: "Les premiers praticiens de l'énergie diffuse sont reconnus. On les appelle les Façonneurs." },
          { year: "An 510", title: "Les Grands Royaumes", desc: "Cinq royaumes majeurs établissent leurs territoires sur les ruines des anciennes métropoles." },
          { year: "An 680", title: "Les Cultes des Capsules", desc: "Des sectes se forment autour des chambres de stase intactes, les vénérant comme des autels." },
        ]
      },
      {
        name: "Ère du Déclin",
        range: "Années 700 — 1000 post-stase",
        description: "Les royaumes s'effritent sous le poids de leurs propres contradictions. La magie devient incontrôlable. Des prophéties circulent sur 'les dormants qui reviendront en dieux'.",
        events: [
          { year: "An 740", title: "La Grande Fracture", desc: "Le plus puissant royaume s'effondre en une nuit. Cause inconnue — certains parlent d'une libération d'énergie des capsules." },
          { year: "An 890", title: "Les Prophéties de l'Éveil", desc: "Un réseau de devins annonce l'arrivée imminente d'êtres d'une puissance inégalée." },
          { year: "An 980", title: "Les Premiers Signes", desc: "Des capsules commencent à émettre une lumière dorée. Le décompte a commencé." },
        ]
      },
      {
        name: "Nouvelle Aube — An 7060",
        range: "An 1000+ post-stase — Présent",
        description: "Le présent du jeu. Les Neo Gods s'éveillent dans un monde qui les craint et les vénère. Chaque réveil est un événement. Chaque Neo God porte en lui mille ans d'histoire humaine — et une puissance que ce nouveau monde ne comprend pas encore.",
        events: [
          { year: "An 1000", title: "Le Premier Éveil", desc: "La première chambre s'ouvre. Celui qui en sort brûle accidentellement un village entier. Les légendes commencent." },
          { year: "An 1012", title: "L'Ordre de l'Aube", desc: "Fondation d'une organisation dédiée à accueillir — et surveiller — les Neo Gods qui s'éveillent." },
          { year: "An 1030", title: "La Guerre des Cultes", desc: "Différentes factions se disputent le contrôle et la dévotion des Neo Gods nouvellement éveillés." },
          { year: "Présent", title: "L'Ère des Neo Gods", desc: "Vous voici. Le monde retient son souffle. Que ferez-vous de ce pouvoir hérité d'un monde qui n'existe plus ?" },
        ]
      }
    ];

    let currentEraIndex = 0;

    function buildTimeline() {
      const el = document.getElementById('era-timeline');
      el.innerHTML = ERAS.map((era, i) => `
        <button class="era-item ${i === currentEraIndex ? 'active' : ''}" onclick="goToEra(${i})">
          <div class="era-dot"></div>
          <div class="era-name">${era.name.split(' — ')[0].split(' / ')[0]}</div>
        </button>
      `).join('');
    }

    function renderEra(idx) {
      currentEraIndex = idx;
      const era = ERAS[idx];
      const panel = document.getElementById('detail-panel');

      panel.innerHTML = `
        <div class="detail-header">
          <div class="detail-eyebrow">Ère ${idx + 1} / ${ERAS.length}</div>
          <div class="detail-name">${era.name}</div>
          <div class="detail-range">${era.range}</div>
        </div>
        <p class="detail-desc">${era.description}</p>
        <div class="events-eyebrow">Événements marquants</div>
        <div class="cal-events">
          ${era.events.map(ev => `
            <div class="cal-event">
              <div class="cal-event-year">${ev.year}</div>
              <div class="cal-event-text">
                <div class="cal-event-title">${ev.title}</div>
                <div class="cal-event-desc">${ev.desc}</div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="detail-nav">
          <button class="detail-nav-btn" onclick="goToEra(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>
            ← <span class="label">Ère précédente</span>
          </button>
          <div class="detail-nav-counter">${idx + 1} / ${ERAS.length}</div>
          <button class="detail-nav-btn" onclick="goToEra(${idx + 1})" ${idx === ERAS.length - 1 ? 'disabled' : ''}>
            <span class="label">Ère suivante</span> →
          </button>
        </div>
      `;
    }

    function goToEra(idx) {
      if (idx < 0 || idx >= ERAS.length) return;
      currentEraIndex = idx;
      buildTimeline();
      renderEra(idx);
      document.querySelector('.detail-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goToEra(currentEraIndex + 1);
      if (e.key === 'ArrowLeft') goToEra(currentEraIndex - 1);
    });

    /* INIT */
    buildTimeline();
    renderEra(0);
  </script>

</body>
</html>
