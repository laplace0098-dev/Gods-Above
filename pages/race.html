<!-- Page SPA : Gods Above — Race &amp; Lignées -->
<style>
    /* ─── RESET & TOKENS (identiques à index.html) ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --gold-dim: #7A622A;
      --dark: #0A0B0F;
      --panel: #12131A;
      --panel-2: #1E1F28;
      --border: rgba(201,168,76,0.25);
      --text: #E8DFC7;
      --text-muted: #8FA8C0;
      --accent: #8FA8C0;
      --danger: #C45C5C;
      --green: #6FAE6F;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }
    ::selection { background: var(--gold-dim); color: var(--text); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

    a { color: inherit; }

    /* ─── NAV (identique à index.html) ─── */
    .site-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,11,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-btn {
      padding: 6px 18px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      border: none;
    }
    .nav-btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .nav-btn-outline:hover { border-color: var(--gold); background: rgba(201,168,76,0.06); }
    .nav-btn-fill { background: var(--gold); color: var(--dark); font-weight: 600; }
    .nav-btn-fill:hover { background: var(--gold-light); }

    /* ─── PAGE HERO ─── */
    .page-hero {
      position: relative;
      padding: 80px 48px 40px;
      text-align: center;
      overflow: hidden;
    }
    .page-hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%),
        #0A0B0F;
      z-index: -1;
    }
    .page-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px; justify-content: center;
    }
    .page-eyebrow::before, .page-eyebrow::after {
      content: '';
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--text-muted));
    }
    .page-eyebrow::after { transform: scaleX(-1); }
    .page-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 60px rgba(201,168,76,0.3);
      margin-bottom: 20px;
    }
    .page-tagline {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text);
      max-width: 560px;
      line-height: 1.8;
      margin: 0 auto;
      opacity: 0.85;
    }

    /* ─── CONTROLS: SEARCH + FILTERS ─── */
    .controls-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 48px 20px;
    }
    .search-bar {
      max-width: 480px;
      margin: 0 auto 28px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 14px 20px 14px 44px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--gold); }
    .search-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .filter-row {
      display: flex; flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .filter-chip {
      padding: 9px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--gold); color: var(--text); }
    .filter-chip.active {
      background: var(--gold);
      color: var(--dark);
      border-color: var(--gold);
      font-weight: 700;
    }

    .results-count {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin: 24px 0 4px;
    }
    .results-count strong { color: var(--gold); }

    /* ─── RACE GRID ─── */
    .race-section {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 48px 100px;
    }
    .race-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      margin-top: 32px;
    }
    .race-card {
      padding: 32px 28px;
      background: var(--panel);
      display: flex; flex-direction: column; gap: 14px;
      cursor: pointer;
      transition: background 0.3s;
      position: relative;
      overflow: hidden;
    }
    .race-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }
    .race-card:hover { background: var(--panel-2); }
    .race-card:hover::before { transform: scaleX(1); }

    .race-card-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .race-card-icon { font-size: 1.8rem; line-height: 1; }
    .race-card-title {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .race-card-desc {
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text-muted);
      flex: 1;
    }

    .race-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: auto;
    }
    .race-tag {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .race-tag.tag-playable { color: var(--green); border-color: rgba(111,174,111,0.35); }
    .race-tag.tag-not-playable { color: var(--danger); border-color: rgba(196,92,92,0.35); }
    .race-tag.tag-tameable { color: var(--gold-light); border-color: rgba(201,168,76,0.4); }
    .race-tag.tag-not-tameable { color: var(--text-muted); }

    .no-results {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      grid-column: 1 / -1;
    }
    .no-results-icon { font-size: 2rem; margin-bottom: 16px; opacity: 0.5; }

    /* ─── MODAL DETAIL ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(4,5,10,0.85);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      max-width: 640px; width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
    }
    .modal-title-wrap { display: flex; align-items: center; gap: 14px; }
    .modal-title-icon { font-size: 1.6rem; }
    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted); font-size: 1.2rem;
      cursor: pointer; padding: 4px 8px;
      transition: color 0.2s;
      line-height: 1;
    }
    .modal-close:hover { color: var(--gold); }
    .modal-body { padding: 32px 40px 40px; }
    .modal-body p {
      font-size: 0.9rem;
      line-height: 1.9;
      color: var(--text);
      font-weight: 300;
      margin-bottom: 20px;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .site-nav { padding: 0 20px; }
      .nav-links { display: none; }
      .page-hero { padding: 56px 20px 32px; }
      .controls-wrap, .race-section { padding-left: 20px; padding-right: 20px; }
      .filter-chip { font-size: 0.6rem; padding: 8px 14px; }
    }
  </style>
<!-- NAV -->

<!-- PAGE HERO -->
<header class="page-hero">
<div class="page-hero-bg"></div>
<div class="page-eyebrow">Lore — Lignées du Monde</div>
<h1 class="page-title">Race &amp; Lignées</h1>
<p class="page-tagline">
      Mille ans de mutation ont façonné des lignées nouvelles — certaines marchent à vos côtés,
      d'autres se chassent, se dressent ou se craignent.
    </p>
</header>
<!-- CONTROLS -->
<div class="controls-wrap">
<div class="search-bar">
<span class="search-icon">⌕</span>
<input class="search-input" id="search-input" oninput="renderRaces()" placeholder="Rechercher une race..." type="text"/>
</div>
<div class="filter-row" id="filter-row">
<!-- généré dynamiquement par JS à partir de FILTERS -->
</div>
<div class="results-count" id="results-count"></div>
</div>
<!-- RACE GRID -->
<section class="race-section">
<div class="race-grid" id="race-grid">
<!-- généré dynamiquement par JS -->
</div>
</section>
<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal-race-detail" onclick="closeModalOverlay(event, 'modal-race-detail')">
<div class="modal">
<div class="modal-header">
<div class="modal-title-wrap">
<span class="modal-title-icon" id="detail-icon"></span>
<span class="modal-title" id="detail-title"></span>
</div>
<button class="modal-close" onclick="closeModal('modal-race-detail')">✕</button>
</div>
<div class="modal-body">
<div class="race-tags" id="detail-tags" style="margin-bottom: 24px;"></div>
<p id="detail-desc"></p>
</div>
</div>
</div>
<script>
    /* ═══════════════════════════════════════════════════════════
       DONNÉES — RACES (exemples, à remplacer/compléter)
       playable  : true = Jouable / false = Non jouable
       tameable  : true = Domesticable / false = Non domesticable
    ═══════════════════════════════════════════════════════════ */
    const RACES = [
      {
        name: "Dormant Éveillé",
        icon: "✦",
        desc: "Humains plongés en sommeil pendant mille ans, réveillés saturés d'énergie diffuse. Leur corps a changé, leur esprit aussi — certains en ont fait des dieux vivants.",
        playable: true,
        tameable: false,
      },
      {
        name: "Façonneur",
        icon: "🔥",
        desc: "Descendants des premiers praticiens de la magie naissante. Ils manipulent l'énergie diffuse avec une précision rituelle transmise de génération en génération.",
        playable: true,
        tameable: false,
      },
      {
        name: "Errant des Ruines",
        icon: "⚙️",
        desc: "Communautés nomades vivant au cœur des vestiges technologiques. Adaptés à la survie, méfiants envers la magie qu'ils jugent responsable de la chute de l'Ancien Monde.",
        playable: true,
        tameable: false,
      },
      {
        name: "Sylphe des Cimes",
        icon: "🍃",
        desc: "Peuple discret vivant dans les hautes forêts pétries de magie. On dit qu'ils peuvent ployer le vent et parler aux arbres centenaires.",
        playable: true,
        tameable: false,
      },
      {
        name: "Golem de Cendre",
        icon: "🗿",
        desc: "Constructions anciennes ranimées par la pollution magique. Sans conscience propre, ils obéissent aux rares Façonneurs capables de les lier.",
        playable: false,
        tameable: true,
      },
      {
        name: "Lupir Mutant",
        icon: "🐺",
        desc: "Grands canidés mutés par les radiations magiques résiduelles. Intelligents et territoriaux, certains clans réussissent à en apprivoiser un jeune isolé de sa meute.",
        playable: false,
        tameable: true,
      },
      {
        name: "Hydre des Marais",
        icon: "🐍",
        desc: "Créature à têtes multiples nichée dans les zones humides saturées de magie instable. Imprévisible et dangereuse, jamais réellement domestiquée.",
        playable: false,
        tameable: false,
      },
      {
        name: "Spectre de Pollution",
        icon: "☣️",
        desc: "Entité immatérielle née de la concentration extrême d'énergie diffuse toxique. Sa simple présence corrompt l'esprit des vivants — aucune domestication connue n'a survécu.",
        playable: false,
        tameable: false,
      },
      {
        name: "Cervin Doré",
        icon: "🦌",
        desc: "Cervidé porteur de bois luminescents, attiré par les zones de forte magie. Farouche mais paisible, il se laisse parfois approcher par les Sylphes des Cimes.",
        playable: false,
        tameable: true,
      },
      {
        name: "Cultiste Mué",
        icon: "🕯️",
        desc: "Anciens humains volontairement exposés à la magie brute lors de rituels interdits. Leur transformation est instable et souvent fatale — peu en restent maîtres d'eux-mêmes.",
        playable: false,
        tameable: false,
      },
    ];

    /* ═══════════════════════════════════════════════════════════
       FILTRES
    ═══════════════════════════════════════════════════════════ */
    const FILTERS = [
      { id: 'all',            label: 'Toutes',             test: () => true },
      { id: 'playable',       label: 'Jouable',            test: r => r.playable === true },
      { id: 'not-playable',   label: 'Non jouable',        test: r => r.playable === false },
      { id: 'tameable',       label: 'Domesticable',       test: r => r.tameable === true },
      { id: 'not-tameable',   label: 'Non domesticable',   test: r => r.tameable === false },
    ];

    let activeFilter = 'all';

    function buildFilterRow() {
      const row = document.getElementById('filter-row');
      row.innerHTML = FILTERS.map(f =>
        `<button class="filter-chip ${f.id === activeFilter ? 'active' : ''}" onclick="setFilter('${f.id}')">${f.label}</button>`
      ).join('');
    }

    function setFilter(id) {
      activeFilter = id;
      buildFilterRow();
      renderRaces();
    }

    function tagsHtml(race) {
      const playTag = race.playable
        ? `<span class="race-tag tag-playable">Jouable</span>`
        : `<span class="race-tag tag-not-playable">Non jouable</span>`;
      const tameTag = race.tameable
        ? `<span class="race-tag tag-tameable">Domesticable</span>`
        : `<span class="race-tag tag-not-tameable">Non domesticable</span>`;
      return playTag + tameTag;
    }

    function renderRaces() {
      const query = document.getElementById('search-input').value.trim().toLowerCase();
      const filterDef = FILTERS.find(f => f.id === activeFilter) || FILTERS[0];

      const filtered = RACES.filter(r => {
        const matchesFilter = filterDef.test(r);
        const matchesQuery = !query || r.name.toLowerCase().includes(query) || r.desc.toLowerCase().includes(query);
        return matchesFilter && matchesQuery;
      });

      const grid = document.getElementById('race-grid');
      const count = document.getElementById('results-count');

      count.innerHTML = `<strong>${filtered.length}</strong> race${filtered.length !== 1 ? 's' : ''} trouvée${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">⌕</div>
            Aucune race ne correspond à ta recherche.
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map((r, i) => `
        <div class="race-card" onclick="openRaceDetail(${RACES.indexOf(r)})">
          <div class="race-card-top">
            <div class="race-card-icon">${r.icon}</div>
          </div>
          <div>
            <div class="race-card-title">${r.name}</div>
            <p class="race-card-desc">${r.desc}</p>
          </div>
          <div class="race-tags">${tagsHtml(r)}</div>
        </div>
      `).join('');
    }

    function openRaceDetail(idx) {
      const r = RACES[idx];
      document.getElementById('detail-icon').textContent = r.icon;
      document.getElementById('detail-title').textContent = r.name;
      document.getElementById('detail-tags').innerHTML = tagsHtml(r);
      document.getElementById('detail-desc').textContent = r.desc;
      openModal('modal-race-detail');
    }

    function openModal(id) {
      document.getElementById(id).classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
      document.body.style.overflow = '';
    }
    function closeModalOverlay(e, id) {
      if (e.target.id === id) closeModal(id);
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal('modal-race-detail');
    });

    /* INIT */
    buildFilterRow();
    renderRaces();
  </script>
